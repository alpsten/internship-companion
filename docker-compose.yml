services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      APP_ALLOWED_DOMAINS: yh.nackademin.se,hogwarts.wiz,starfleet.academy
      APP_FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./web
      args:
        VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - backend
    ports:
      - "5173:80"
