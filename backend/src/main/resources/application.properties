spring.application.name=internship-companion-backend
server.port=${PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
app.allowed-domain=${APP_ALLOWED_DOMAIN:yh.nackademin.se}
app.allowed-domains=${APP_ALLOWED_DOMAINS:${APP_ALLOWED_DOMAIN:yh.nackademin.se}}
app.frontend-origin=${APP_FRONTEND_ORIGIN:http://localhost:5173}
brevo.api-key=${BREVO_API_KEY}
